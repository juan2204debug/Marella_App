          <div style={{background:D.bg4,borderRadius:12,padding:"12px 14px",marginBottom:14,border:`1px solid ${D.ln0}`}}>{[{l:"Op. Gravada",v:fmt(t.base)},{l:"IGV (18%)",v:fmt(t.igv)}].map(r=>(<div key={r.l} style={{display:"flex",justifyContent:"space-between",fontSize:11,color:D.t2,marginBottom:4}}><span>{r.l}</span><span style={{fontFamily:D.mono}}>{r.v}</span></div>))}{t.descBCP>0&&<div style={{display:"flex",justifyContent:"space-between",fontSize:12,color:D.blue,marginBottom:4,fontWeight:600}}><span>🏦 BCP Visa</span><span style={{fontFamily:D.mono}}>-{fmt(t.descBCP)}</span></div>}<div style={{display:"flex",justifyContent:"space-between",color:D.gc,fontWeight:700,fontSize:19,marginTop:8,paddingTop:8,borderTop:`1px solid ${D.ln1}`,fontFamily:D.serif}}><span>TOTAL</span><span>{fmt(t.totalConDesc)}</span></div></div>
          <div style={{color:D.t3,fontSize:9,letterSpacing:2,textTransform:"uppercase",marginBottom:10}}>Tipo de comprobante</div>
          <div style={{display:"flex",gap:8,marginBottom:14}}>{["boleta","factura"].map(tp=>(<button key={tp} onClick={()=>setDocT(tp)} style={{flex:1,padding:"11px",borderRadius:11,cursor:"pointer",fontFamily:D.sans,border:`1px solid ${docT===tp?D.gb:D.ln1}`,background:docT===tp?D.gd:"#FFFFFF",color:docT===tp?D.gb:D.t2,fontWeight:600,fontSize:12,transition:"all .15s"}}>{tp==="boleta"?"🧾 Boleta":"📄 Factura"}</button>))}</div>
          {docT==="factura"&&<div style={{marginBottom:14}}><Inp label="RUC" value={cRUC} onChange={e=>setCRUC(e.target.value)} placeholder="20123456789"/><Inp label="Razón Social" value={cRazon} onChange={e=>setCRazon(e.target.value)} placeholder="Empresa S.A.C."/><Inp label="Dirección" value={cDir} onChange={e=>setCDir(e.target.value)} placeholder="Av. Ejemplo 123"/></div>}
          <div style={{display:"flex",gap:8}}><Btn onClick={()=>{setCobroM(null);setBcpActivo(false);}} variant="ghost" style={{flex:1}}>Cancelar</Btn><Btn onClick={()=>issueDoc(p.id)} variant="gold" style={{flex:2}}>Emitir y Cerrar Mesa</Btn></div>
        </div></div>
      );})()}

      {/* ═══ MODAL: ANULAR ══ */}
      {voidM&&(<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.55)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:400,padding:20}} onClick={e=>{if(e.target===e.currentTarget)setVoidM(null);}}><div style={{background:"#FFFFFF",borderRadius:16,padding:"24px 20px",width:"100%",maxWidth:380,animation:"M-in .2s ease",boxShadow:"0 20px 60px rgba(0,0,0,.18)"}}><div style={{textAlign:"center",marginBottom:18}}><div style={{fontSize:32}}>⚠️</div><div style={{fontFamily:D.serif,color:D.red,fontSize:20,fontWeight:600,marginTop:8}}>Anular pedido</div><div style={{color:D.t2,fontSize:12,marginTop:4}}>Queda registrado con tu nombre. No se borra.</div></div><div style={{marginBottom:16}}><div style={{color:D.t2,fontSize:9,letterSpacing:1.5,textTransform:"uppercase",marginBottom:7}}>Motivo de anulación</div><textarea value={voidReason} onChange={e=>setVoidReason(e.target.value)} placeholder="Error en pedido, cliente cambió de opinión..." style={{width:"100%",padding:"10px 13px",borderRadius:9,border:`1px solid ${D.ln1}`,background:"#FFFFFF",color:D.t0,fontSize:13,outline:"none",fontFamily:D.sans,resize:"none",height:90,transition:"border-color .18s"}} onFocus={e=>e.target.style.borderColor=D.red} onBlur={e=>e.target.style.borderColor=D.ln1}/></div><div style={{display:"flex",gap:8}}><Btn onClick={()=>setVoidM(null)} variant="ghost" style={{flex:1}}>Cancelar</Btn><Btn onClick={desestimar} variant="red" style={{flex:2}}>Confirmar anulación</Btn></div></div></div>)}

      {/* ═══ MODAL: NOTA ══ */}
      {notaM&&(<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.52)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:400,padding:20}} onClick={e=>{if(e.target===e.currentTarget)setNotaM(null);}}><div style={{background:"#FFFFFF",borderRadius:16,padding:"22px 20px",width:"100%",maxWidth:380,animation:"M-in .2s ease",boxShadow:"0 20px 60px rgba(0,0,0,.18)"}}><div style={{fontFamily:D.serif,color:D.t0,fontSize:20,fontWeight:600,marginBottom:4}}>Agregar anotación</div><div style={{color:D.t2,fontSize:11,marginBottom:14}}>Firmado como: <b>{empleado}</b></div><textarea value={notaTxt} onChange={e=>setNotaTxt(e.target.value)} placeholder="Escribe la anotación..." style={{width:"100%",padding:"10px 13px",borderRadius:9,border:`1px solid ${D.ln1}`,background:"#FFFFFF",color:D.t0,fontSize:13,outline:"none",fontFamily:D.sans,resize:"none",height:100,marginBottom:14,transition:"border-color .18s"}} onFocus={e=>e.target.style.borderColor=D.gb} onBlur={e=>e.target.style.borderColor=D.ln1}/><div style={{display:"flex",gap:8}}><Btn onClick={()=>setNotaM(null)} variant="ghost" style={{flex:1}}>Cancelar</Btn><Btn onClick={agregarNota} disabled={!notaTxt.trim()} variant="gold" style={{flex:2}}>Guardar nota</Btn></div></div></div>)}

      {/* ═══ MODAL: TURNO CERRAR ══ */}
      {turnoModal&&turnoActivo&&(<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.55)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:400,padding:20}} onClick={e=>{if(e.target===e.currentTarget)setTurnoModal(false);}}><div style={{background:"#FFFFFF",borderRadius:16,padding:"24px 20px",width:"100%",maxWidth:400,animation:"M-in .2s ease",boxShadow:"0 20px 60px rgba(0,0,0,.18)"}}>
        <div style={{fontFamily:D.serif,color:D.t0,fontSize:22,fontWeight:600,marginBottom:4}}>Cerrar turno</div>
        <div style={{color:D.t2,fontSize:11,marginBottom:16}}>El historial queda guardado. La vista se reinicia.</div>
        {(()=>{const compsTurno=comps.filter(c=>c.turnoId===turnoActivo.id);const pedTurno=pedidos.filter(p=>p.turnoId===turnoActivo.id);const venta=compsTurno.reduce((s,c)=>s+c.totalConDesc,0);return(
          <div style={{background:D.bg4,borderRadius:12,padding:"14px",marginBottom:16,border:`1px solid ${D.ln0}`}}>
            <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8,textAlign:"center"}}>
              {[{l:"Pedidos",v:pedTurno.length,c:D.nb3},{l:"Boletas",v:compsTurno.length,c:D.t1},{l:"Venta",v:fmt(venta),c:D.gc}].map(s=>(<div key={s.l}><div style={{color:s.c,fontWeight:700,fontSize:18,fontFamily:s.c===D.gc?D.serif:D.display}}>{s.v}</div><div style={{color:D.t3,fontSize:9,marginTop:2}}>{s.l}</div></div>))}
            </div>
            <div style={{marginTop:10,color:D.t2,fontSize:10,fontFamily:D.mono,textAlign:"center"}}>Inicio: {tsH(turnoActivo.inicio)}</div>
          </div>
        );})()}
        <div style={{marginBottom:16}}><div style={{color:D.t2,fontSize:9,letterSpacing:1.5,textTransform:"uppercase",marginBottom:7}}>Nota de cierre (opcional)</div><textarea value={turnoNotaClose} onChange={e=>setTurnoNotaClose(e.target.value)} placeholder="Observaciones del turno..." style={{width:"100%",padding:"10px 13px",borderRadius:9,border:`1px solid ${D.ln1}`,background:"#FFFFFF",color:D.t0,fontSize:13,outline:"none",fontFamily:D.sans,resize:"none",height:80}} onFocus={e=>e.target.style.borderColor=D.gb} onBlur={e=>e.target.style.borderColor=D.ln1}/></div>
        <div style={{display:"flex",gap:8}}><Btn onClick={()=>setTurnoModal(false)} variant="ghost" style={{flex:1}}>Cancelar</Btn><Btn onClick={cerrarTurno} variant="red" style={{flex:2}}>Cerrar turno</Btn></div>
      </div></div>)}

      {/* ═══ MODAL: COMPROBANTE ══ */}
      {compM&&(<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.55)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:400,padding:18}} onClick={e=>{if(e.target===e.currentTarget)setCompM(null);}}><div style={{background:"#FFFFFF",borderRadius:16,padding:"22px 20px",width:"100%",maxWidth:340,animation:"M-in .2s ease",maxHeight:"90vh",overflowY:"auto",fontFamily:D.sans,boxShadow:"0 20px 60px rgba(0,0,0,.18)"}}><div style={{textAlign:"center",paddingBottom:14,marginBottom:14,borderBottom:"2px dashed #E0DDD6"}}><div style={{fontSize:8,color:"#BDBAB2",letterSpacing:3,textTransform:"uppercase",marginBottom:2}}>Powered by Marea Systems</div><div style={{fontWeight:700,fontSize:16,color:D.t0}}>{TENANT}</div><div style={{display:"inline-block",background:"#F0F9FF",border:"1px solid #BAE6FD",color:"#0369A1",fontSize:8,fontWeight:700,letterSpacing:2,padding:"2px 12px",borderRadius:20,marginTop:6,textTransform:"uppercase"}}>{compM.tipo==="boleta"?"Boleta de Venta":"Factura Electrónica"}</div><div style={{fontWeight:700,fontSize:13,color:D.t0,marginTop:6}}>{compM.numero}</div><div style={{fontSize:10,color:"#BDBAB2",marginTop:3}}>{compM.fecha}</div></div>{compM.ruc&&<div style={{background:D.bg4,borderRadius:8,padding:"9px 11px",marginBottom:11,fontSize:11,color:"#444",lineHeight:1.8}}><b>RUC:</b> {compM.ruc}<br/><b>Razón:</b> {compM.razon}<br/><b>Dir:</b> {compM.dir}</div>}<div style={{fontSize:11,color:"#999",marginBottom:9}}>{compM.mesa}{compM.mozo&&` · ${compM.mozo}`}</div>{compM.items.map(it=>(<div key={it.id} style={{display:"flex",justifyContent:"space-between",fontSize:12,color:"#222",marginBottom:7,paddingBottom:7,borderBottom:"1px solid #F0EDE6"}}><div><div>{it.plato.emoji} {it.plato.nombre}</div>{it.mods?.length>0&&<div style={{fontSize:9,color:"#BDBAB2",marginTop:2}}>{it.mods.map(m=>MODS.find(x=>x.id===m)?.label||m).join(" · ")}</div>}</div><span style={{fontWeight:700,fontFamily:D.mono,minWidth:54,textAlign:"right"}}>{fmt(it.precio)}</span></div>))}{compM.descBCP>0&&<div style={{background:"#EFF6FF",border:"1px solid #BFDBFE",borderRadius:8,padding:"8px 10px",marginBottom:10,fontSize:11,color:"#1D4ED8"}}>🏦 BCP Visa: <b>-{fmt(compM.descBCP)}</b><br/><span style={{fontSize:9,opacity:.7}}>40% comida · máx S/100 · no acumulable</span></div>}<div style={{borderTop:"2px dashed #E0DDD6",marginTop:8,paddingTop:12}}>{[{l:"Op. Gravada",v:fmt(compM.base),b:false},{l:"IGV (18%)",v:fmt(compM.igv),b:false},{l:"TOTAL",v:fmt(compM.totalConDesc),b:true}].map(r=>(<div key={r.l} style={{display:"flex",justifyContent:"space-between",fontSize:r.b?16:11,fontWeight:r.b?800:400,color:r.b?D.t0:"#888",marginBottom:5}}><span>{r.l}</span><span style={{color:r.b?"#7A5C10":"inherit",fontFamily:D.mono}}>{r.v}</span></div>))}</div><div style={{textAlign:"center",marginTop:12,fontSize:8,color:"#D8D5CE",letterSpacing:1,lineHeight:1.8}}>REPRESENTACIÓN IMPRESA · MAREA SYSTEMS v{VER}</div><div style={{display:"flex",gap:8,marginTop:16}}><button onClick={()=>setCompM(null)} style={{flex:1,padding:"10px",borderRadius:9,border:`1px solid ${D.ln1}`,background:"#FFFFFF",color:D.t2,fontWeight:500,fontSize:12,cursor:"pointer"}}>Cerrar</button><button onClick={()=>printDoc(compM)} style={{flex:2,padding:"10px",borderRadius:9,border:"none",background:D.nb1,color:"#E8EFFF",fontWeight:700,fontSize:12,cursor:"pointer",boxShadow:"0 4px 14px rgba(10,31,56,.25)",transition:"all .18s"}} onMouseEnter={e=>e.currentTarget.style.background=D.nb2} onMouseLeave={e=>e.currentTarget.style.background=D.nb1}>🖨️ Imprimir {compM.tipo}</button></div></div></div>)}

      <style>{`
        @keyframes M-rise{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
        @keyframes M-up{from{transform:translateY(112%)}to{transform:translateY(0)}}
        @keyframes M-in{from{opacity:0}to{opacity:1}}
        @keyframes M-ping{0%,100%{opacity:1}50%{opacity:.35}}
        @keyframes M-bell{0%,100%{transform:rotate(0)}20%{transform:rotate(14deg)}40%{transform:rotate(-10deg)}60%{transform:rotate(6deg)}80%{transform:rotate(-3deg)}}
        @keyframes M-float{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
        @keyframes M-notif-in{from{opacity:0;transform:translateX(110%)}to{opacity:1;transform:translateX(0)}}
        input[type=date]{color-scheme:light}
        ::-webkit-scrollbar{width:3px;height:3px}
        ::-webkit-scrollbar-thumb{background:#D1C4A8;border-radius:4px}
        *{-webkit-tap-highlight-color:transparent}
      `}</style>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
