const BCP_DESCUENTO = 0.40;
const BCP_MAXIMO    = 100;
const VER = "2.4.0"; const BUILD = "20250529"; const TENANT = "Marella Cevichería";

/* ══ UTILS ═══════════════════════════════════════════ */
const gid  = () => Date.now().toString(36)+Math.random().toString(36).slice(2,6);
const fmt  = n  => `S/ ${Number(n).toFixed(2)}`;
const pad  = n  => String(n).padStart(2,"0");
const isoD = ts => new Date(ts).toISOString().slice(0,10);
const tsD  = ts => new Date(ts).toLocaleDateString("es-PE",{day:"2-digit",month:"2-digit",year:"numeric"});
const tsH  = ts => new Date(ts).toLocaleTimeString("es-PE",{hour:"2-digit",minute:"2-digit",second:"2-digit",hour12:false});
const nowStr = () => new Date().toLocaleString("es-PE",{day:"2-digit",month:"2-digit",year:"numeric",hour:"2-digit",minute:"2-digit",second:"2-digit",hour12:false});
const ela  = ts => { const s=Math.floor((Date.now()-ts)/1000),m=Math.floor(s/60),h=Math.floor(m/60); return h>0?`${pad(h)}:${pad(m%60)}:${pad(s%60)}`:`${pad(m)}:${pad(s%60)}`; };
const mins = ms => ms ? (ms/60000).toFixed(1) : null;

function tots(items, bcpActivo=false){
  const bebidas  = items.filter(i=>i.plato.esBebida).reduce((s,i)=>s+i.precio,0);
  const comida   = items.filter(i=>!i.plato.esBebida).reduce((s,i)=>s+i.precio,0);
  const total    = +items.reduce((s,i)=>s+i.precio,0).toFixed(2);
  let descBCP    = 0;
  if(bcpActivo){
    const baseDesc = Math.min(comida * BCP_DESCUENTO, BCP_MAXIMO);
    descBCP = +baseDesc.toFixed(2);
  }
  const totalConDesc = +(total - descBCP).toFixed(2);
  const base = +(totalConDesc/(1+0.18)).toFixed(2);
  return {
    subtotalBebidas:+bebidas.toFixed(2),
    subtotalComida:+comida.toFixed(2),
    total:+total.toFixed(2),
    descBCP,
    totalConDesc,
    base,
    igv:+(totalConDesc-base).toFixed(2),
  };
}

/* ══ BCP DESCUENTO calc visible ══════════════════════ */
function calcBCP(items){
  const comida = items.filter(i=>!i.plato.esBebida).reduce((s,i)=>s+i.precio,0);
  return Math.min(comida * BCP_DESCUENTO, BCP_MAXIMO);
}

/* ══ EXCEL ═══════════════════════════════════════════ */
function xlsxExport(pedidos,comps,d1,d2){
  try{
    const wb=XLSX.utils.book_new();
    const r1=[];
    pedidos.filter(p=>p.ts>=d1&&p.ts<=d2).sort((a,b)=>a.ts-b.ts).forEach(p=>{
      const t=tots(p.items,p.bcpActivo);
      p.items.forEach((it,idx)=>{
        const ms=it.mods.map(m=>MODS.find(x=>x.id===m)?.label||m).join("|");
        const comp=p.compId?comps.find(c=>c.id===p.compId):null;
        r1.push({"Fecha":tsD(p.ts),"Hora":tsH(p.ts),"ID":p.id,"Mesa":p.mesa,
          "Mozo":p.mozo||"","Estado":ESTADOS[p.estado]?.label||p.estado,
          "BCP":p.bcpActivo?"Sí":"No","#":idx+1,"Plato":it.plato.nombre,
          "Precio":it.precio,"Mods":ms,"Nota":it.nota||"",
          "T.Mozo→Cocina(min)":idx===0&&p.tsPreparando?+mins(p.tsPreparando-p.ts):"",
          "T.Preparación(min)":idx===0&&p.tsListo&&p.tsPreparando?+mins(p.tsListo-p.tsPreparando):"",
          "T.Cocina→Cobro(min)":idx===0&&p.tsCobrado&&p.tsListo?+mins(p.tsCobrado-p.tsListo):"",
          "Desc.BCP":idx===0?t.descBCP:"","Total":idx===0?t.totalConDesc:"",
          "Comprobante":idx===0&&comp?comp.numero:"",
          "Motivo anulación":idx===0&&p.motivoAnulacion?p.motivoAnulacion:"",
        });
      });
    });
    const ws1=XLSX.utils.json_to_sheet(r1.length?r1:[{"Sin datos":"—"}]);
    XLSX.utils.book_append_sheet(wb,ws1,"Pedidos");

    // Rendimiento empleados
    const rendimiento={};
    pedidos.forEach(p=>{
      const emp=p.mozo||"Sin asignar";
      if(!rendimiento[emp]) rendimiento[emp]={nombre:emp,pedidos:0,fallas:0,tMozoCocina:[],tCierreCobro:[],notas:0};
      rendimiento[emp].pedidos++;
      if(p.estado==="desestimado") rendimiento[emp].fallas++;
      if(p.tsPreparando&&p.ts) rendimiento[emp].tMozoCocina.push(mins(p.tsPreparando-p.ts));
      if(p.tsCobrado&&p.tsListo) rendimiento[emp].tCierreCobro.push(mins(p.tsCobrado-p.tsListo));
      if(p.notas&&p.notas.length) rendimiento[emp].notas+=p.notas.length;
    });
    const r2=Object.values(rendimiento).map(e=>({
      "Empleado":e.nombre,"Pedidos":e.pedidos,"Fallas/Anulados":e.fallas,
      "% Fallas":e.pedidos?+((e.fallas/e.pedidos)*100).toFixed(1):0,
      "Prom T.Mozo→Cocina(min)":e.tMozoCocina.length?+(e.tMozoCocina.reduce((a,b)=>a+ +b,0)/e.tMozoCocina.length).toFixed(1):"",
      "Prom T.Cierre→Cobro(min)":e.tCierreCobro.length?+(e.tCierreCobro.reduce((a,b)=>a+ +b,0)/e.tCierreCobro.length).toFixed(1):"",
      "Notas registradas":e.notas,
    }));
    const ws2=XLSX.utils.json_to_sheet(r2.length?r2:[{"Sin datos":"—"}]);
    XLSX.utils.book_append_sheet(wb,ws2,"Rendimiento");

    const b64=XLSX.write(wb,{bookType:"xlsx",type:"base64"});
    const a=document.createElement("a");
    a.href=`data:application/vnd.openxmlformats-officedocument.spreadsheetml.sheet;base64,${b64}`;
    a.download=`Marella_${isoD(d1)}_${isoD(d2)}.xlsx`;
    document.body.appendChild(a);a.click();
    setTimeout(()=>document.body.removeChild(a),500);
    return true;
  }catch(e){console.error(e);return false;}
}

/* ══ PRINT ═══════════════════════════════════════════ */
function printDoc(comp){
  const lines=comp.items.map(it=>`<tr><td>${it.plato.emoji} ${it.plato.nombre}${it.mods?.length?`<div class="m">${it.mods.map(m=>MODS.find(x=>x.id===m)?.label||m).join(" · ")}</div>`:""}</td><td class="r">S/ ${it.precio.toFixed(2)}</td></tr>`).join("");
  const w=window.open("","_blank","width=400,height=700");
  if(!w) return;
  w.document.write(`<!DOCTYPE html><html><head><meta charset="utf-8"><title>${comp.numero}</title>
  <style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:'DM Sans',sans-serif;width:300px;margin:0 auto;padding:20px}
  .h{text-align:center;padding-bottom:12px;border-bottom:2px dashed #E0DDD6;margin-bottom:12px}
  .ten{font-size:17px;font-weight:700;color:#1A1824;margin:4px 0}
  .badge{display:inline-block;background:#F0F9FF;border:1px solid #BAE6FD;color:#0369A1;font-size:8px;font-weight:700;letter-spacing:2px;padding:2px 12px;border-radius:20px;text-transform:uppercase}
  .num{font-weight:700;font-size:14px;margin:6px 0 2px}.date{font-size:10px;color:#C4C1D2}
  .mesa{font-size:11px;color:#8A879E;margin:8px 0 10px}
  table{width:100%;border-collapse:collapse}td{padding:5px 0;vertical-align:top;font-size:12px}
  .r{text-align:right;font-weight:600;padding-left:8px;white-space:nowrap}.m{font-size:9px;color:#C4C1D2;margin-top:2px}
  hr{border:none;border-top:2px dashed #E0DDD6;margin:10px 0}
  .sub{font-size:11px;color:#8A879E}.tot{font-size:16px;font-weight:800}.gold{color:#8A6820}
  .bcp{background:#EFF6FF;border:1px solid #BFDBFE;border-radius:8px;padding:8px 10px;margin:10px 0;font-size:11px;color:#1D4ED8}
  .foot{text-align:center;font-size:9px;color:#C4C1D2;margin-top:14px;line-height:1.8}
  @media print{body{width:100%}}</style></head><body>
  <div class="h"><div style="font-size:8px;color:#C4C1D2;letter-spacing:3px;text-transform:uppercase">Powered by Marea Systems</div>
  <div class="ten">${TENANT}</div>
  <div class="badge">${comp.tipo==="boleta"?"Boleta de Venta":"Factura Electrónica"}</div>
  <div class="num">${comp.numero}</div><div class="date">${comp.fecha}</div></div>
  ${comp.ruc?`<div style="background:#F5F2EC;border-radius:6px;padding:9px;margin-bottom:10px;font-size:11px;line-height:1.9;color:#4A4560"><b>RUC:</b> ${comp.ruc}<br><b>Razón:</b> ${comp.razon}<br><b>Dir:</b> ${comp.dir}</div>`:""}
  <div class="mesa">${comp.mesa}${comp.mozo?" · "+comp.mozo:""}</div>
  <table>${lines}<tr><td colspan="2"><hr></td></tr>
  <tr><td class="sub">Op. gravada</td><td class="r sub">S/ ${(comp.totalConDesc/(1+0.18)).toFixed(2)}</td></tr>
  <tr><td class="sub">IGV (18%)</td><td class="r sub">S/ ${(comp.totalConDesc-(comp.totalConDesc/(1+0.18))).toFixed(2)}</td></tr>
  ${comp.descBCP>0?`<tr><td colspan="2"><hr></td></tr></table>
  <div class="bcp">🏦 Descuento BCP Mastercard<br><b>-S/ ${comp.descBCP.toFixed(2)}</b> aplicado (40% en comida, máx S/100)<br><small>No aplica bebidas · No acumulable</small></div><table>`:""}
  <tr><td colspan="2"><hr></td></tr>
  <tr><td class="tot">TOTAL</td><td class="r tot gold">S/ ${comp.totalConDesc.toFixed(2)}</td></tr>
  </table><div class="foot">Gracias por su visita · ${TENANT}<br>MAREA v${VER}</div>
  <script>window.onload=()=>{window.print();window.onafterprint=()=>window.close()}<\/script>
  </body></html>`);
  w.document.close();
}

function Btn({children,onClick,variant="gold",full,disabled,style:sx={}}){
  const v={
    gold:{bg:`linear-gradient(135deg,${D.gb},${D.ga})`,color:"#111",border:"none",shadow:"0 3px 12px rgba(201,168,76,.28)"},
    navy:{bg:D.nb1,color:"#F0F4FF",border:"none",shadow:"0 3px 10px rgba(10,31,56,.22)"},

    red:{bg:D.red,color:"#fff",border:"none",shadow:`0 3px 10px ${D.red}44`},
  }[variant]||{};
  return(<button disabled={disabled} onClick={onClick} style={{width:full?"100%":"auto",padding:"11px 20px",borderRadius:10,cursor:disabled?"not-allowed":"pointer",background:v.bg,color:v.color,border:v.border,fontFamily:D.sans,fontWeight:700,fontSize:13,letterSpacing:.3,boxShadow:v.shadow,transition:"all .18s",opacity:disabled?.45:1,...sx}}

      onFocus={e=>e.target.style.borderColor=D.gb} onBlur={e=>e.target.style.borderColor=D.ln1}/>

}

    <div style={{height:1,flex:1,background:`linear-gradient(270deg,transparent,${D.gb}44)`}}/>
  </div>);
}

/* ══ SPLASH ══════════════════════════════════════════ */
function Splash({onDone}){
  const [ph,setPh]=useState(0);
  useEffect(()=>{const t=[setTimeout(()=>setPh(1),300),setTimeout(()=>setPh(2),800),setTimeout(()=>setPh(3),1500),setTimeout(()=>onDone(),2600)];return()=>t.forEach(clearTimeout);},[]);
  return(<div style={{position:"fixed",inset:0,background:D.canvas,zIndex:9999,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",transition:"opacity .6s",opacity:ph===3?0:1,pointerEvents:"none",fontFamily:D.sans}}>
    <div style={{position:"absolute",inset:0,backgroundImage:`radial-gradient(${D.ln1} 1px,transparent 1px)`,backgroundSize:"28px 28px",pointerEvents:"none"}}/>
    <div style={{position:"relative",textAlign:"center"}}>

/* ══ ROLE + EMPLEADO SELECT ══════════════════════════ */

  const [nombre,setNombre]=useState("");

  if(!rol) return(
    <div style={{minHeight:"100vh",background:D.canvas,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:28,fontFamily:D.sans,position:"relative"}}>
      <div style={{position:"absolute",inset:0,backgroundImage:`radial-gradient(${D.ln1} 1px,transparent 1px)`,backgroundSize:"28px 28px",pointerEvents:"none"}}/>
      <div style={{position:"relative",textAlign:"center",maxWidth:400,width:"100%"}}>
        <div style={{display:"flex",justifyContent:"center",marginBottom:12}}><Logo size={52}/></div>
        <h1 style={{fontFamily:D.serif,fontSize:44,fontWeight:400,letterSpacing:8,color:D.t0,textTransform:"uppercase",margin:"0 0 4px"}}>Marella</h1>
        <div style={{color:D.gb,fontSize:10,letterSpacing:4,textTransform:"uppercase",marginBottom:6,fontFamily:D.display}}>Order Intelligence System</div>
        <div style={{color:D.t2,fontSize:12,marginBottom:36}}>{TENANT}</div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:12,marginBottom:32}}>
          {Object.entries(ROLES).map(([key,r],i)=>(
            <button key={key} onClick={()=>key==="manager"?onSelect("manager","Administrador"):setRol(key)}
              style={{background:"#FFFFFF",border:`1px solid ${D.ln1}`,borderRadius:16,padding:"20px 10px",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:8,transition:"all .22s",fontFamily:D.sans,boxShadow:"0 2px 8px rgba(0,0,0,.06)",animation:`M-rise .6s ${.18+i*.07}s ease both`}}
              onMouseEnter={e=>{e.currentTarget.style.borderColor=D.gb;e.currentTarget.style.transform="translateY(-5px)";e.currentTarget.style.boxShadow="0 10px 28px rgba(138,104,32,.12)";}}
              onMouseLeave={e=>{e.currentTarget.style.borderColor=D.ln1;e.currentTarget.style.transform="";e.currentTarget.style.boxShadow="0 2px 8px rgba(0,0,0,.06)";}}>
              <span style={{fontSize:28}}>{r.icon}</span>
              <div style={{color:D.t0,fontWeight:600,fontSize:12,letterSpacing:.5}}>{r.label}</div>
              <div style={{color:D.t2,fontSize:10,lineHeight:1.3,textAlign:"center"}}>{r.sub}</div>
            </button>
          ))}
        </div>
        <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
          <span style={{width:5,height:5,borderRadius:"50%",background:D.green,display:"inline-block"}}/>
          <span style={{fontFamily:D.mono,fontSize:10,color:D.t2}}>Firebase · Tiempo real · v{VER}</span>
        </div>
      </div>
    </div>
  );

  const lista = rol==="waiter" ? (empleados.mozos||[]) : (empleados.cocina||[]);
  return(
    <div style={{minHeight:"100vh",background:D.canvas,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:28,fontFamily:D.sans,position:"relative"}}>
      <div style={{position:"absolute",inset:0,backgroundImage:`radial-gradient(${D.ln1} 1px,transparent 1px)`,backgroundSize:"28px 28px",pointerEvents:"none"}}/>
      <div style={{position:"relative",textAlign:"center",maxWidth:360,width:"100%"}}>
        <div style={{display:"flex",justifyContent:"center",marginBottom:12}}><Logo size={40}/></div>
        <div style={{fontFamily:D.serif,fontSize:28,fontWeight:400,letterSpacing:6,color:D.t0,textTransform:"uppercase",marginBottom:4}}>Marella</div>
        <div style={{color:D.gb,fontSize:10,letterSpacing:3,textTransform:"uppercase",marginBottom:24,fontFamily:D.display}}>
          {ROLES[rol].icon} {ROLES[rol].label}
        </div>
        <div style={{background:"#FFFFFF",borderRadius:16,padding:20,border:`1px solid ${D.ln1}`,boxShadow:"0 4px 20px rgba(0,0,0,.08)",marginBottom:16}}>
          <div style={{color:D.t2,fontSize:10,letterSpacing:1.5,textTransform:"uppercase",marginBottom:12,fontFamily:D.sans}}>¿Quién eres?</div>
          <div style={{display:"flex",flexDirection:"column",gap:8}}>
            {lista.map(n=>(
              <button key={n} onClick={()=>setNombre(n)}
                style={{padding:"12px 16px",borderRadius:10,border:`1.5px solid ${nombre===n?D.gb:D.ln1}`,background:nombre===n?D.gd:"#FFFFFF",color:nombre===n?D.gb:D.t0,fontWeight:600,fontSize:13,cursor:"pointer",fontFamily:D.sans,transition:"all .15s",textAlign:"left",boxShadow:nombre===n?"0 2px 8px rgba(138,104,32,.18)":"none"}}>
                {nombre===n?"✓ ":""}{n}
              </button>
            ))}
          </div>
        </div>
        <div style={{display:"flex",gap:10}}>
          <Btn onClick={()=>{setRol(null);setNombre("");}} variant="ghost" style={{flex:1}}>← Volver</Btn>
          <Btn onClick={()=>{if(nombre)onSelect(rol,nombre);}} disabled={!nombre} variant="gold" style={{flex:2}}>Entrar</Btn>
        </div>
      </div>
    </div>
  );
}

/* ══ APP PRINCIPAL ═══════════════════════════════════ */
function App(){
  const [dbReady,  setDbReady]  = useState(!!window.DB_READY);
  const [splash,   setSplash]   = useState(true);
  const [rol,      setRol]      = useState(null);
  const [empleado, setEmpleado] = useState(null);
  const [pedidos,  setPedidos]  = useState([]);
  const [menu,     setMenu]     = useState(MENU_DEFAULT);
  const [comps,    setComps]    = useState([]);
  const [empleados,setEmpleados]= useState(EMPLEADOS_DEFAULT);
  const [vista,    setVista]    = useState("floor");
  const [bell,     setBell]     = useState(false);
  const prevPend               = useRef(0);

  // Pedido
  const [mesa,    setMesa]    = useState("1");
  const [carrito, setCarrito] = useState([]);
  const [modM,    setModM]    = useState(null);
  const [selM,    setSelM]    = useState([]);
  const [noteI,   setNoteI]   = useState("");

  // Cobro
  const [cobroM,  setCobroM]  = useState(null);
  const [docT,    setDocT]    = useState("boleta");
  const [bcpActivo,setBcpActivo]=useState(false);
  const [cRUC,    setCRUC]    = useState("");
  const [cRazon,  setCRazon]  = useState("");
  const [cDir,    setCDir]    = useState("");
  const [compM,   setCompM]   = useState(null);

  // Desestimar
  const [voidM,   setVoidM]   = useState(null);
  const [voidReason,setVoidReason]=useState("");

  // Notas en pedido
  const [notaM,   setNotaM]   = useState(null); // {pedidoId}
  const [notaTxt, setNotaTxt] = useState("");

  // UX
  const [filter,  setFilter]  = useState("all");
  const [expand,  setExpand]  = useState(null);

  // Reporte
  const hoy=isoD(Date.now());
  const [exFrom,setExFrom]=useState(hoy);
  const [exTo,  setExTo]  =useState(hoy);
  const [exBusy,setExBusy]=useState(false);
  const [exMsg, setExMsg] =useState(null);
  const [editP, setEditP] =useState({});

  // Rendimiento filtro
  const [rendFiltro,setRendFiltro]=useState("todos");

  useEffect(()=>{
    if(window.DB_READY){setDbReady(true);return;}
    window.addEventListener("db-ready",()=>setDbReady(true),{once:true});
  },[]);

  useEffect(()=>{
    if(!dbReady) return;
    const u1=window.DB.onPedidos(setPedidos);
    const u2=window.DB.onComps(setComps);
    window.DB.onConfig("menu",setMenu);
    window.DB.onConfig("empleados",setEmpleados);
    return()=>{u1();u2();};
  },[dbReady]);

  const vivos  = pedidos.filter(p=>p.estado!=="desestimado"&&!p.cerrado);
  const nPend  = vivos.filter(p=>p.estado==="pendiente").length;
  const nPrep  = vivos.filter(p=>p.estado==="preparando").length;
  const nDone  = vivos.filter(p=>p.estado==="listo").length;
  const nItems = vivos.reduce((s,p)=>s+p.items.length,0);

  useEffect(()=>{
    if(nPend>prevPend.current){setBell(true);setTimeout(()=>setBell(false),2500);}
    prevPend.current=nPend;
  },[nPend]);

  /* ── Acciones ── */
  const sendOrder=async()=>{
    if(!carrito.length) return;
    const p={id:gid(),mesa:`Mesa ${mesa}`,items:[...carrito],estado:"pendiente",ts:Date.now(),cerrado:false,mozo:empleado,notas:[]};
    await window.DB.savePedido(p);
    setCarrito([]);setVista("floor");
  };

  const advance=async id=>{
    const now=Date.now();
    const p=pedidos.find(x=>x.id===id);if(!p||!ESTADOS[p.estado]?.next)return;
    const next=ESTADOS[p.estado].next;
    const updates={...p,estado:next};
    if(next==="preparando") updates.tsPreparando=now;
    if(next==="listo")      updates.tsListo=now;
    await window.DB.savePedido(updates);
  };

  const addItem=()=>{
    if(!modM)return;
    setCarrito(c=>[...c,{id:gid(),plato:modM.plato,precio:modM.plato.precio,mods:[...selM],nota:noteI}]);
    setModM(null);setSelM([]);setNoteI("");
  };

  const issueDoc=async pedidoId=>{
    const p=pedidos.find(x=>x.id===pedidoId);if(!p)return;
    const t=tots(p.items,bcpActivo);
    const now=Date.now();
    const num=comps.length+1;
    const serie=docT==="boleta"?"B001":"F001";
    const comp={id:gid(),numero:`${serie}-${String(num).padStart(6,"0")}`,tipo:docT,ts:now,fecha:nowStr(),mesa:p.mesa,mozo:p.mozo,pedidoId,items:p.items,...t,...(docT==="factura"&&{ruc:cRUC,razon:cRazon,dir:cDir})};
    await window.DB.saveComp(comp);
    await window.DB.savePedido({...p,cerrado:true,compId:comp.id,tsCobrado:now,bcpActivo});
    setCobroM(null);setCompM(comp);setBcpActivo(false);
    setCRUC("");setCRazon("");setCDir("");setDocT("boleta");
  };

  const desestimar=async()=>{
    const p=pedidos.find(x=>x.id===voidM);if(!p)return;
    const nota={ts:Date.now(),autor:empleado,texto:`ANULADO: ${voidReason||"Sin motivo especificado"}`};
    await window.DB.savePedido({...p,estado:"desestimado",motivoAnulacion:voidReason,tsAnulado:Date.now(),notas:[...(p.notas||[]),nota]});
    setVoidM(null);setVoidReason("");setExpand(null);
  };

  const agregarNota=async()=>{
    if(!notaTxt.trim()) return;
    const p=pedidos.find(x=>x.id===notaM);if(!p)return;
    const nota={id:gid(),ts:Date.now(),autor:empleado,texto:notaTxt.trim()};
    await window.DB.savePedido({...p,notas:[...(p.notas||[]),nota]});
    setNotaM(null);setNotaTxt("");
  };

  const savePrecio=async(cat,idx,val)=>{
    const n=parseFloat(val);if(isNaN(n)||n<=0)return;
    const nm={...menu,[cat]:menu[cat].map((p,i)=>i===idx?{...p,precio:n}:p)};
    await window.DB.saveConfig("menu",nm);setEditP({});
  };

  const saveEmpleados=async(em)=>{
    await window.DB.saveConfig("empleados",em);setEmpleados(em);
  };

  /* ── Rendimiento ── */
  const rendimiento = useMemo(()=>{
    const map={};
    const todosEmpleados=[...(empleados.mozos||[]),...(empleados.cocina||[])];
    todosEmpleados.forEach(n=>{map[n]={nombre:n,tipo:empleados.mozos?.includes(n)?"mozo":"cocina",pedidos:0,fallas:0,tMozoCocina:[],tCocinaCierre:[],tCierreCobro:[],notas:0};});
    pedidos.forEach(p=>{
      if(!p.mozo||!map[p.mozo])return;
      const e=map[p.mozo];
      e.pedidos++;
      if(p.estado==="desestimado")e.fallas++;
      if(p.tsPreparando&&p.ts) e.tMozoCocina.push((p.tsPreparando-p.ts)/60000);
      if(p.tsListo&&p.tsPreparando) e.tCocinaCierre.push((p.tsListo-p.tsPreparando)/60000);
      if(p.tsCobrado&&p.tsListo) e.tCierreCobro.push((p.tsCobrado-p.tsListo)/60000);
      if(p.notas) e.notas+=p.notas.length;
    });
    return Object.values(map).map(e=>({...e,
      avgMozoCocina:  e.tMozoCocina.length  ? +(e.tMozoCocina.reduce((a,b)=>a+b,0)/e.tMozoCocina.length).toFixed(1)   : null,
      avgCocinaCierre:e.tCocinaCierre.length ? +(e.tCocinaCierre.reduce((a,b)=>a+b,0)/e.tCocinaCierre.length).toFixed(1):null,
      avgCierreCobro: e.tCierreCobro.length  ? +(e.tCierreCobro.reduce((a,b)=>a+b,0)/e.tCierreCobro.length).toFixed(1) : null,
      pctFallas: e.pedidos ? +((e.fallas/e.pedidos)*100).toFixed(1) : 0,
    }));
  },[pedidos,empleados]);

  const rpFrom=new Date(exFrom+"T00:00:00").getTime();
  const rpTo  =new Date(exTo+"T23:59:59").getTime();

  const TABS=[
    {key:"floor",   icon:"⊞",label:"Comandas",  roles:["waiter","kitchen","manager"]},
    {key:"kitchen", icon:"🔥",label:"Cocina",    roles:["kitchen","manager"]},
    {key:"rendimiento",icon:"👤",label:"Equipo", roles:["waiter","kitchen","manager"]},
    {key:"new",     icon:"＋",label:"Pedido",    roles:["waiter"]},
    {key:"receipts",icon:"⬡",label:"Caja",      roles:["waiter","manager"]},
    {key:"reports", icon:"↓",label:"Reportes",  roles:["manager"]},
    {key:"menu",    icon:"✦",label:"Menú",      roles:["manager"]},
  ].filter(t=>t.roles.includes(rol));

  if(!dbReady)return(<div style={{minHeight:"100vh",background:D.canvas,display:"flex",alignItems:"center",justifyContent:"center",fontFamily:D.sans}}><div style={{textAlign:"center"}}><Logo size={48}/><div style={{color:D.t2,marginTop:14,fontSize:13}}>Conectando…</div></div></div>);
  if(splash)return <Splash onDone={()=>setSplash(false)}/>;
  if(!rol)  return <RoleSelect onSelect={(r,n)=>{setRol(r);setEmpleado(n);setVista(r==="kitchen"?"kitchen":"floor");}} empleados={empleados}/>;

  return(
    <div style={{minHeight:"100vh",background:D.canvas,fontFamily:D.sans,color:D.t0}}>

      {/* ── HEADER ── */}
      <header style={{position:"sticky",top:0,zIndex:200,background:"rgba(240,237,230,0.95)",backdropFilter:"blur(22px)",WebkitBackdropFilter:"blur(22px)",borderBottom:`1px solid ${D.ln1}`,boxShadow:"0 1px 0 rgba(0,0,0,.06)"}}>
        <div style={{maxWidth:1200,margin:"0 auto",padding:"0 16px"}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",height:52}}>
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <Logo size={24}/>
              <div>
                <div style={{fontFamily:D.serif,color:D.gb,fontSize:18,fontWeight:600,letterSpacing:3,lineHeight:1}}>Marella</div>
                <div style={{color:D.t2,fontSize:9,letterSpacing:1,textTransform:"uppercase"}}>{empleado} · {ROLES[rol]?.label}</div>
              </div>
            </div>
            <div style={{display:"flex",gap:6,alignItems:"center"}}>
              {nPend>0&&<div style={{display:"flex",alignItems:"center",gap:5,background:D.amberD,border:`1px solid ${D.amber}44`,borderRadius:20,padding:"3px 10px",animation:"M-ping 1.4s infinite"}}><span style={{width:5,height:5,borderRadius:"50%",background:D.amber,display:"inline-block"}}/><span style={{fontSize:11,fontWeight:700,color:D.amber}}>{nPend} nuevo{nPend>1?"s":""}</span></div>}
              <div style={{display:"flex",alignItems:"center",gap:4,padding:"3px 9px",borderRadius:20,background:D.greenD,border:`1px solid ${D.green}33`}}>
                <span style={{width:5,height:5,borderRadius:"50%",background:D.green,display:"inline-block"}}/>
                <span style={{fontSize:9,color:D.green,fontFamily:D.mono,fontWeight:600}}>LIVE</span>
              </div>
              <button style={{width:32,height:32,borderRadius:8,background:"#FFFFFF",border:`1px solid ${D.ln1}`,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",position:"relative",animation:bell?"M-bell .5s ease":"none",transition:"all .18s"}}
                onMouseEnter={e=>e.currentTarget.style.borderColor=D.gb} onMouseLeave={e=>e.currentTarget.style.borderColor=D.ln1}>
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke={D.t2} strokeWidth="2" strokeLinecap="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
                {nPend>0&&<span style={{position:"absolute",top:4,right:4,width:6,height:6,borderRadius:"50%",background:D.amber}}/>}
              </button>
              <button onClick={()=>{setRol(null);setEmpleado(null);}} style={{width:32,height:32,borderRadius:8,background:"#FFFFFF",border:`1px solid ${D.ln1}`,color:D.t2,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",transition:"all .18s"}}
                onMouseEnter={e=>{e.currentTarget.style.borderColor=D.red;e.currentTarget.style.color=D.red;}} onMouseLeave={e=>{e.currentTarget.style.borderColor=D.ln1;e.currentTarget.style.color=D.t2;}}>
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
              </button>
            </div>
          </div>

          {/* workload */}
          <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",borderTop:`1px solid ${D.ln0}`,borderBottom:`1px solid ${D.ln0}`,marginLeft:-16,marginRight:-16}}>
            {[{label:"Items",n:nItems,c:D.t0},{label:"Nuevo",n:nPend,c:D.amber},{label:"Cocina",n:nPrep,c:D.blue},{label:"Listo",n:nDone,c:D.green}].map((s,i)=>(
              <div key={s.label} style={{padding:"8px 0",textAlign:"center",borderRight:i<3?`1px solid ${D.ln0}`:"none",cursor:i>0?"pointer":"default",transition:"background .18s"}}
                onMouseEnter={e=>{if(i>0)e.currentTarget.style.background=D.bg4;}} onMouseLeave={e=>{e.currentTarget.style.background="transparent";}}
                onClick={()=>{if(i>0){setFilter(["all","pendiente","preparando","listo"][i]);setVista("floor");}}}>
                <div style={{fontFamily:D.display,fontSize:18,fontWeight:700,color:s.c,lineHeight:1}}>{s.n}</div>
                <div style={{fontSize:8,color:D.t3,letterSpacing:.6,marginTop:2,textTransform:"uppercase"}}>{s.label}</div>
              </div>
            ))}
          </div>

          {/* tabs */}
          <div style={{display:"flex",overflowX:"auto"}}>
            {TABS.map(tab=>{
              const active=vista===tab.key;
              return(<button key={tab.key} onClick={()=>setVista(tab.key)} style={{flex:1,minWidth:50,padding:"9px 4px 11px",border:"none",background:"transparent",fontFamily:D.sans,fontWeight:active?600:400,fontSize:9,letterSpacing:.6,cursor:"pointer",color:active?D.gb:D.t3,textTransform:"uppercase",borderBottom:active?`2px solid ${D.gb}`:"2px solid transparent",transition:"all .18s",whiteSpace:"nowrap"}}>
                <div style={{fontSize:12,marginBottom:2,opacity:active?1:.5}}>{tab.icon}</div>{tab.label}
              </button>);
            })}
          </div>
        </div>
      </header>

      <main style={{maxWidth:1200,margin:"0 auto",padding:"0 16px",paddingBottom:40}}>

        {/* ══ FLOOR ════════════════════════════════════ */}
        {vista==="floor"&&(
          <div style={{paddingTop:14}}>
            <div style={{display:"flex",gap:6,marginBottom:14,overflowX:"auto",paddingBottom:2}}>
              {[["all","Todos"],["pendiente","● Nuevo"],["preparando","◐ Cocina"],["listo","◉ Listo"],["desestimado","✕ Anulado"]].map(([k,v])=>(
                <button key={k} onClick={()=>{setFilter(k);setExpand(null);}} style={{padding:"5px 14px",borderRadius:20,border:"none",cursor:"pointer",fontFamily:D.sans,fontWeight:600,fontSize:10,whiteSpace:"nowrap",background:filter===k?D.gb:D.bg4,color:filter===k?"#111":D.t2,transition:"all .18s"}}>{v}</button>
              ))}
            </div>

            {/* DETALLE EXPANDIDO */}
            {expand&&(()=>{
              const p=pedidos.find(x=>x.id===expand);
              if(!p){setExpand(null);return null;}
              const st=ESTADOS[p.estado]||ESTADOS.pendiente;
              const t=tots(p.items,p.bcpActivo);
              const esVoid=p.estado==="desestimado";
              return(
                <div style={{animation:"M-in .2s ease",maxWidth:640,margin:"0 auto"}}>
                  <button onClick={()=>setExpand(null)} style={{display:"flex",alignItems:"center",gap:6,marginBottom:12,background:"none",border:"none",color:D.t2,fontSize:11,cursor:"pointer",fontFamily:D.sans}}>
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><path d="m15 18-6-6 6-6"/></svg>Volver
                  </button>
                  <div style={{background:"#FFFFFF",borderRadius:18,overflow:"hidden",border:esVoid?`1.5px solid ${D.red}44`:`1px solid ${st.color}33`,boxShadow:"0 4px 24px rgba(0,0,0,.08)"}}>
                    <div style={{padding:"14px 18px",background:esVoid?`${D.red}08`:`${st.color}0C`,borderBottom:`1px solid ${D.ln0}`}}>
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                        <div>
                          <div style={{fontFamily:D.serif,fontSize:26,fontWeight:600,color:esVoid?D.red:D.t0,lineHeight:1}}>{p.mesa}</div>
                          <div style={{display:"flex",gap:8,marginTop:5,alignItems:"center",flexWrap:"wrap"}}>
                            <Badge estado={p.estado}/>
                            {p.mozo&&<span style={{fontSize:11,color:D.t2,fontFamily:D.sans}}>🤵 {p.mozo}</span>}
                            <Timer ts={p.ts} color={D.t2}/>
                          </div>
                          <div style={{color:D.t3,fontSize:10,marginTop:4,fontFamily:D.mono}}>{tsD(p.ts)} · {tsH(p.ts)}</div>
                          {/* Tiempos por zona */}
                          <div style={{display:"flex",gap:8,marginTop:6,flexWrap:"wrap"}}>
                            {p.tsPreparando&&<span style={{fontSize:10,color:D.amber,fontFamily:D.mono,background:D.amberD,padding:"2px 8px",borderRadius:10}}>🤵→🔥 {mins(p.tsPreparando-p.ts)}min</span>}
                            {p.tsListo&&p.tsPreparando&&<span style={{fontSize:10,color:D.blue,fontFamily:D.mono,background:D.blueD,padding:"2px 8px",borderRadius:10}}>🔥 {mins(p.tsListo-p.tsPreparando)}min</span>}
                            {p.tsCobrado&&p.tsListo&&<span style={{fontSize:10,color:D.green,fontFamily:D.mono,background:D.greenD,padding:"2px 8px",borderRadius:10}}>✓→💳 {mins(p.tsCobrado-p.tsListo)}min</span>}
                          </div>
                          {esVoid&&p.motivoAnulacion&&<div style={{fontSize:11,color:D.red,marginTop:6,fontStyle:"italic"}}>Motivo: {p.motivoAnulacion}</div>}
                        </div>
                        <div style={{textAlign:"right"}}>
                          <div style={{color:D.gc,fontWeight:800,fontSize:22,fontFamily:D.serif}}>{fmt(t.totalConDesc)}</div>
                          {t.descBCP>0&&<div style={{color:D.blue,fontSize:11,marginTop:2}}>-{fmt(t.descBCP)} BCP</div>}
                        </div>
                      </div>
                    </div>

                    {/* items */}
                    <div style={{padding:"10px 18px"}}>
                      {p.items.map((it,i)=>(
                        <div key={it.id} style={{display:"flex",gap:10,padding:"8px 0",borderBottom:i<p.items.length-1?`1px solid ${D.ln0}`:"none"}}>
                          <div style={{width:38,height:38,borderRadius:10,background:D.bg4,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,flexShrink:0}}>{it.plato.emoji}</div>
                          <div style={{flex:1}}>
                            <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline"}}>
                              <span style={{color:D.t0,fontWeight:500,fontSize:13}}>{it.plato.nombre}</span>
                              <span style={{color:D.gc,fontWeight:700,fontSize:12,background:D.gd,padding:"1px 7px",borderRadius:8,fontFamily:D.mono}}>{fmt(it.precio)}</span>
                            </div>
                            {it.mods?.length>0&&<div style={{display:"flex",flexWrap:"wrap",gap:4,marginTop:4}}>{it.mods.map(mid=>{const m=MODS.find(x=>x.id===mid);return m?(<span key={mid} style={{padding:"2px 7px",borderRadius:6,fontSize:10,background:D.cb,border:`1px solid ${D.ca}33`,color:D.ca}}>{m.icon} {m.label}</span>):null;})}</div>}
                            {it.nota&&<div style={{color:D.t2,fontSize:11,marginTop:3,fontStyle:"italic"}}>📝 {it.nota}</div>}
                          </div>
                        </div>
                      ))}
                    </div>

                    {/* notas del pedido */}
                    {(p.notas?.length>0||(!esVoid&&!p.cerrado))&&(
                      <div style={{padding:"10px 18px",background:D.bg4,borderTop:`1px solid ${D.ln0}`}}>
                        <div style={{color:D.t2,fontSize:9,letterSpacing:1.5,textTransform:"uppercase",marginBottom:8,fontFamily:D.sans}}>Anotaciones</div>
                        {p.notas?.map(n=>(
                          <div key={n.id||n.ts} style={{background:"#FFFFFF",borderRadius:8,padding:"8px 10px",marginBottom:6,border:`1px solid ${D.ln0}`}}>
                            <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}>
                              <span style={{color:D.gb,fontSize:10,fontWeight:600}}>{n.autor}</span>
                              <span style={{color:D.t3,fontSize:9,fontFamily:D.mono}}>{tsH(n.ts)}</span>
                            </div>
                            <div style={{color:D.t0,fontSize:12}}>{n.texto}</div>
                          </div>
                        ))}
                        {!esVoid&&!p.cerrado&&(
                          <button onClick={()=>{setNotaM(p.id);setNotaTxt("");}} style={{width:"100%",padding:"8px",borderRadius:8,border:`1px dashed ${D.ln2}`,background:"transparent",color:D.t2,fontSize:11,cursor:"pointer",fontFamily:D.sans,transition:"all .15s"}}
                            onMouseEnter={e=>{e.currentTarget.style.borderColor=D.gb;e.currentTarget.style.color=D.gb;}} onMouseLeave={e=>{e.currentTarget.style.borderColor=D.ln2;e.currentTarget.style.color=D.t2;}}>
                            + Agregar anotación
                          </button>
                        )}
                      </div>
                    )}

                    {/* totales */}
                    <div style={{padding:"10px 18px",background:D.bg4,borderTop:`1px solid ${D.ln0}`}}>
                      {[{l:"Op. Gravada",v:fmt(t.base)},{l:"IGV 18%",v:fmt(t.igv)}].map(r=>(
                        <div key={r.l} style={{display:"flex",justifyContent:"space-between",fontSize:11,color:D.t2,marginBottom:4}}><span>{r.l}</span><span style={{fontFamily:D.mono}}>{r.v}</span></div>
                      ))}
                      {t.descBCP>0&&<div style={{display:"flex",justifyContent:"space-between",fontSize:11,color:D.blue,marginBottom:4}}><span>🏦 Descuento BCP</span><span style={{fontFamily:D.mono}}>-{fmt(t.descBCP)}</span></div>}
                      <div style={{display:"flex",justifyContent:"space-between",color:D.gc,fontWeight:800,fontSize:18,marginTop:7,paddingTop:7,borderTop:`1px solid ${D.ln1}`,fontFamily:D.serif}}><span>TOTAL</span><span>{fmt(t.totalConDesc)}</span></div>
                    </div>

                    {/* acciones */}
                    {!esVoid&&!p.cerrado&&(
                      <div style={{padding:"10px 18px",display:"flex",gap:8,borderTop:`1px solid ${D.ln0}`,flexWrap:"wrap"}}>
                        {ESTADOS[p.estado]?.next&&(
                          <button onClick={()=>advance(p.id)} style={{flex:1,minWidth:120,padding:"10px",borderRadius:10,cursor:"pointer",fontFamily:D.sans,fontWeight:700,fontSize:12,background:D.nb1,border:`1px solid ${D.nb2}`,color:"#F0F4FF",transition:"all .18s"}}
                            onMouseEnter={e=>e.currentTarget.style.background=D.nb2} onMouseLeave={e=>e.currentTarget.style.background=D.nb1}>→ {ESTADOS[ESTADOS[p.estado].next].label}</button>
                        )}
                        {rol==="waiter"&&p.estado==="listo"&&<Btn onClick={()=>setCobroM(p.id)} variant="gold" style={{flex:1,minWidth:120,padding:"10px"}}>🧾 Cobrar mesa</Btn>}
                        <button onClick={()=>{setVoidM(p.id);setVoidReason("");}} style={{padding:"10px 14px",borderRadius:10,border:`1px solid ${D.red}44`,background:D.redD,color:D.red,fontWeight:600,fontSize:11,cursor:"pointer",fontFamily:D.sans,transition:"all .15s"}}
                          onMouseEnter={e=>e.currentTarget.style.background=`${D.red}22`} onMouseLeave={e=>e.currentTarget.style.background=D.redD}>✕ Anular</button>
                      </div>
                    )}
                  </div>
                </div>
              );
            })()}

            {/* GRID TARJETAS */}
            {!expand&&(()=>{
              const allFilt=filter==="desestimado"?pedidos.filter(p=>p.estado==="desestimado"):vivos.filter(p=>filter==="all"||p.estado===filter);
              if(!allFilt.length)return(<div style={{textAlign:"center",padding:"72px 20px"}}><div style={{animation:"M-float 3s ease-in-out infinite",display:"inline-block"}}><Logo size={50}/></div><p style={{color:D.t3,marginTop:14,fontSize:14}}>Sin comandas activas</p></div>);
              return(<div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(200px,1fr))",gap:12}}>
                {allFilt.map(p=>{
                  const st=ESTADOS[p.estado]||ESTADOS.pendiente;
                  const {totalConDesc,descBCP}=tots(p.items,p.bcpActivo);
                  const n=p.items.length;
                  const urgente=(Date.now()-p.ts)>15*60000&&p.estado==="pendiente";
                  const esVoid=p.estado==="desestimado";
                  return(<div key={p.id} onClick={()=>setExpand(p.id)}
                    style={{background:"#FFFFFF",borderRadius:14,overflow:"hidden",cursor:"pointer",border:esVoid?`1.5px solid ${D.red}44`:urgente?`1.5px solid ${D.red}55`:`1px solid ${st.color}33`,boxShadow:"0 1px 3px rgba(0,0,0,.04),0 4px 12px rgba(0,0,0,.05)",transition:"all .2s",opacity:esVoid?.7:1}}
                    onMouseEnter={e=>{e.currentTarget.style.borderColor=esVoid?D.red:st.color;e.currentTarget.style.background=D.bg3;e.currentTarget.style.transform="translateY(-2px)";}}
                    onMouseLeave={e=>{e.currentTarget.style.borderColor=esVoid?`${D.red}44`:urgente?`${D.red}55`:`${st.color}33`;e.currentTarget.style.background="#FFFFFF";e.currentTarget.style.transform="";}}>
                    <div style={{padding:"6px 10px",background:esVoid?`${D.red}08`:urgente?`${D.red}0C`:`${st.color}12`,borderBottom:`1px solid ${D.ln0}`,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                      <Badge estado={p.estado} sm/>
                      <div style={{display:"flex",alignItems:"center",gap:5}}>
                        {p.bcpActivo&&<span style={{fontSize:9,color:D.blue,fontFamily:D.mono,fontWeight:700}}>BCP</span>}
                        <Timer ts={p.ts} color={urgente?D.red:undefined}/>
                      </div>
                    </div>
                    <div style={{padding:"10px 12px 8px"}}>
                      <div style={{fontFamily:D.serif,fontSize:18,fontWeight:600,color:esVoid?D.red:D.t0,marginBottom:2,lineHeight:1}}>{p.mesa}</div>
                      {p.mozo&&<div style={{fontSize:10,color:D.t2,marginBottom:4}}>🤵 {p.mozo}</div>}
                      <div style={{fontFamily:D.mono,color:D.t3,fontSize:9,marginBottom:7}}>{tsH(p.ts)}</div>
                      {p.items.slice(0,3).map(it=>(
                        <div key={it.id} style={{display:"flex",alignItems:"center",gap:5,marginBottom:3}}>
                          <span style={{fontSize:12}}>{it.plato.emoji}</span>
                          <span style={{color:D.t1,fontSize:11,flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{it.plato.nombre}</span>
                          {it.mods?.length>0&&<span style={{color:D.ca,fontSize:9,fontFamily:D.mono}}>+{it.mods.length}</span>}
                        </div>
                      ))}
                      {n>3&&<div style={{color:D.t3,fontSize:9,marginTop:2,fontFamily:D.mono}}>+{n-3} más</div>}
                      {p.notas?.length>0&&<div style={{color:D.purple,fontSize:9,marginTop:4,fontFamily:D.mono}}>📌 {p.notas.length} nota{p.notas.length>1?"s":""}</div>}
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:8,paddingTop:7,borderTop:`1px solid ${D.ln0}`}}>
                        <span style={{color:D.t3,fontSize:9,fontFamily:D.mono}}>{n} item{n>1?"s":""}</span>
                        <div style={{textAlign:"right"}}>
                          <span style={{color:D.gc,fontWeight:700,fontSize:13,fontFamily:D.serif}}>{fmt(totalConDesc)}</span>
                          {descBCP>0&&<div style={{color:D.blue,fontSize:9}}>-{fmt(descBCP)} BCP</div>}
                        </div>
                      </div>
                    </div>
                    {!esVoid&&ESTADOS[p.estado]?.next&&(
                      <button onClick={e=>{e.stopPropagation();advance(p.id);}} style={{width:"100%",padding:"7px",border:"none",cursor:"pointer",fontFamily:D.sans,background:`${st.color}12`,color:st.color,fontWeight:600,fontSize:10,letterSpacing:.4,borderTop:`1px solid ${st.color}22`,transition:"background .18s"}}
                        onMouseEnter={e=>e.currentTarget.style.background=`${st.color}24`} onMouseLeave={e=>e.currentTarget.style.background=`${st.color}12`}>→ {ESTADOS[ESTADOS[p.estado].next].label}</button>
                    )}
                    {!esVoid&&rol==="waiter"&&p.estado==="listo"&&(
                      <button onClick={e=>{e.stopPropagation();setCobroM(p.id);}} style={{width:"100%",padding:"7px",border:"none",cursor:"pointer",fontFamily:D.sans,background:D.gd,color:D.gb,fontWeight:600,fontSize:10,borderTop:`1px solid ${D.gb}22`,transition:"background .18s"}}
                        onMouseEnter={e=>e.currentTarget.style.background=`${D.ga}22`} onMouseLeave={e=>e.currentTarget.style.background=D.gd}>🧾 Cobrar</button>
                    )}
                  </div>);
                })}
              </div>);
            })()}
          </div>
        )}

        {/* ══ COCINA ════════════════════════════════════ */}
        {vista==="kitchen"&&(
          <div style={{paddingTop:14}}>
            <div style={{background:"#FFFFFF",borderRadius:14,padding:"12px 16px",marginBottom:14,border:`1px solid ${D.ln1}`,boxShadow:"0 1px 4px rgba(0,0,0,.06)"}}>
              <div style={{fontFamily:D.serif,fontSize:17,fontWeight:600,color:D.t0}}>Estación de Cocina</div>
              <div style={{color:D.t2,fontSize:11,marginTop:2}}>{new Date().toLocaleDateString("es-PE",{weekday:"long",day:"2-digit",month:"long"})}</div>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
              {["pendiente","preparando"].map(estado=>{
                const st=ESTADOS[estado];
                const lista=vivos.filter(p=>p.estado===estado);
                const nextLabel=ESTADOS[estado].next?ESTADOS[ESTADOS[estado].next].label:"";
                const btnLabel=estado==="pendiente"?"🔥 Iniciar":"✓ Listo";
                return(<div key={estado}>
                  <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:10}}>
                    <span style={{width:8,height:8,borderRadius:"50%",background:st.color,display:"inline-block"}}/>
                    <span style={{color:st.color,fontWeight:700,fontSize:10,letterSpacing:1,textTransform:"uppercase"}}>{st.label} ({lista.length})</span>
                  </div>
                  {lista.length===0&&<div style={{background:"#FFFFFF",borderRadius:12,padding:"18px",border:`1px solid ${D.ln0}`,textAlign:"center",color:D.t3,fontSize:12}}>Sin pedidos</div>}
                  {lista.map(p=>{
                    const urgente=estado==="pendiente"&&(Date.now()-p.ts)>15*60000;
                    return(<div key={p.id} style={{background:"#FFFFFF",borderRadius:12,overflow:"hidden",marginBottom:9,border:urgente?`1.5px solid ${D.red}55`:`1px solid ${st.color}44`,boxShadow:"0 2px 8px rgba(0,0,0,.06)"}}>
                      <div style={{padding:"7px 12px",background:`${st.color}0C`,borderBottom:`1px solid ${D.ln0}`,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                        <div>
                          <span style={{fontFamily:D.serif,fontSize:15,fontWeight:600,color:D.t0}}>{p.mesa}</span>
                          {p.mozo&&<span style={{fontSize:10,color:D.t2,marginLeft:6}}>· {p.mozo}</span>}
                        </div>
                        <Timer ts={p.ts} color={urgente?D.red:st.color}/>
                      </div>
                      <div style={{padding:"10px 12px"}}>
                        {p.items.map(it=>(
                          <div key={it.id} style={{marginBottom:6,display:"flex",gap:6,alignItems:"flex-start"}}>
                            <span style={{fontSize:14}}>{it.plato.emoji}</span>
                            <div style={{flex:1}}>
                              <div style={{color:D.t0,fontSize:12,fontWeight:500,lineHeight:1.3}}>{it.plato.nombre}</div>
                              {it.mods?.length>0&&<div style={{display:"flex",flexWrap:"wrap",gap:3,marginTop:3}}>{it.mods.map(mid=>{const m=MODS.find(x=>x.id===mid);return m?(<span key={mid} style={{fontSize:9,background:D.cb,color:D.ca,padding:"1px 6px",borderRadius:8}}>{m.icon} {m.label}</span>):null;})}</div>}
                              {it.nota&&<div style={{fontSize:9,color:D.red,marginTop:2,fontStyle:"italic"}}>📝 {it.nota}</div>}
                            </div>
                          </div>
                        ))}
                      </div>
                      <button onClick={()=>advance(p.id)} style={{width:"100%",padding:"8px",border:"none",cursor:"pointer",fontFamily:D.sans,background:`${st.color}14`,color:st.color,fontWeight:700,fontSize:10,borderTop:`1px solid ${st.color}22`,transition:"background .18s"}}
                        onMouseEnter={e=>e.currentTarget.style.background=`${st.color}28`} onMouseLeave={e=>e.currentTarget.style.background=`${st.color}14`}>{btnLabel}</button>
                    </div>);
                  })}
                </div>);
              })}
            </div>
            {vivos.filter(p=>p.estado==="listo").length>0&&(
              <div style={{marginTop:16}}>
                <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:10}}>
                  <span style={{width:8,height:8,borderRadius:"50%",background:D.green,display:"inline-block"}}/>
                  <span style={{color:D.green,fontWeight:700,fontSize:10,letterSpacing:1,textTransform:"uppercase"}}>Esperando mozo ({vivos.filter(p=>p.estado==="listo").length})</span>
                </div>
                <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                  {vivos.filter(p=>p.estado==="listo").map(p=>(
                    <div key={p.id} style={{background:"#FFFFFF",borderRadius:10,padding:"10px 14px",border:`1px solid ${D.green}44`,boxShadow:"0 2px 6px rgba(0,0,0,.06)"}}>
                      <div style={{fontFamily:D.serif,fontSize:15,fontWeight:600,color:D.t0}}>{p.mesa}</div>
                      <Timer ts={p.ts} color={D.green}/>
                      <div style={{color:D.t2,fontSize:10,marginTop:2}}>{p.items.length} plato{p.items.length>1?"s":""}</div>
                    </div>
                  ))}
                </div>
              </div>
            )}
          </div>
        )}

        {/* ══ RENDIMIENTO DEL EQUIPO ════════════════════ */}
        {vista==="rendimiento"&&(
          <div style={{paddingTop:14}}>
            <div style={{display:"flex",gap:6,marginBottom:14,overflowX:"auto"}}>
              {[["todos","Todos"],["mozo","Mozos"],["cocina","Cocina"]].map(([k,v])=>(
                <button key={k} onClick={()=>setRendFiltro(k)} style={{padding:"5px 14px",borderRadius:20,border:"none",cursor:"pointer",fontFamily:D.sans,fontWeight:600,fontSize:10,background:rendFiltro===k?D.gb:D.bg4,color:rendFiltro===k?"#111":D.t2,transition:"all .18s"}}>{v}</button>
              ))}
            </div>

            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(280px,1fr))",gap:12}}>
              {rendimiento.filter(e=>rendFiltro==="todos"||e.tipo===rendFiltro).map(e=>(
                <div key={e.nombre} style={{background:"#FFFFFF",borderRadius:16,padding:16,border:`1px solid ${e.pctFallas>20?D.red+"44":D.ln1}`,boxShadow:"0 1px 4px rgba(0,0,0,.06)"}}>
                  {/* cabecera empleado */}
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:12}}>
                    <div>
                      <div style={{fontFamily:D.serif,fontSize:18,fontWeight:600,color:D.t0}}>{e.nombre}</div>
                      <div style={{fontSize:10,color:D.t2,marginTop:2,fontFamily:D.sans}}>{e.tipo==="mozo"?"🤵 Mozo":"👨‍🍳 Cocina"}</div>
                    </div>
                    <div style={{textAlign:"right"}}>
                      <div style={{fontFamily:D.display,fontSize:20,fontWeight:700,color:D.gb}}>{e.pedidos}</div>
                      <div style={{fontSize:9,color:D.t3}}>pedidos</div>
                    </div>
                  </div>

                  {/* fallas */}
                  <div style={{background:e.fallas>0?D.redD:D.greenD,borderRadius:10,padding:"8px 12px",marginBottom:10,display:"flex",justifyContent:"space-between",alignItems:"center",border:`1px solid ${e.fallas>0?D.red:D.green}33`}}>
                    <div>
                      <div style={{fontSize:12,fontWeight:700,color:e.fallas>0?D.red:D.green}}>{e.fallas} anulado{e.fallas!==1?"s":""}</div>
                      <div style={{fontSize:10,color:D.t2}}>{e.pctFallas}% del total</div>
                    </div>
                    <div style={{fontSize:10,color:D.t2,fontFamily:D.mono}}>📌 {e.notas} nota{e.notas!==1?"s":""}</div>
                  </div>

                  {/* tiempos por zona */}
                  <div style={{color:D.t3,fontSize:9,letterSpacing:1.5,textTransform:"uppercase",marginBottom:8,fontFamily:D.sans}}>Tiempos promedio</div>
                  {[
                    {label:"🤵 Mozo → Cocina",val:e.avgMozoCocina,color:D.amber,show:e.tipo==="mozo"},
                    {label:"🔥 Preparación",   val:e.avgCocinaCierre,color:D.blue,show:true},
                    {label:"✓ Listo → Cobro",  val:e.avgCierreCobro, color:D.green,show:e.tipo==="mozo"},
                  ].filter(t=>t.show).map(t=>(
                    <div key={t.label} style={{marginBottom:8}}>
                      <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}>
                        <span style={{fontSize:11,color:D.t1,fontFamily:D.sans}}>{t.label}</span>
                        <span style={{fontSize:11,fontWeight:700,color:t.color,fontFamily:D.mono}}>{t.val!=null?`${t.val} min`:"—"}</span>
                      </div>
                      {t.val!=null&&(
                        <div style={{height:3,background:D.bg4,borderRadius:10,overflow:"hidden"}}>
                          <div style={{height:"100%",borderRadius:10,width:`${Math.min((t.val/30)*100,100)}%`,background:t.color,transition:"width .6s ease"}}/>
                        </div>
                      )}
                    </div>
                  ))}
                </div>
              ))}
            </div>

            {/* historial de anulaciones */}

              </div>

              <div style={{background:D.bg4,borderRadius:12,padding:"12px 14px",marginBottom:14,border:`1px solid ${D.ln0}`}}>
                {[{l:"Op. Gravada",v:fmt(t.base)},{l:"IGV (18%)",v:fmt(t.igv)}].map(r=>(
                  <div key={r.l} style={{display:"flex",justifyContent:"space-between",fontSize:11,color:D.t2,marginBottom:4}}><span>{r.l}</span><span style={{fontFamily:D.mono}}>{r.v}</span></div>
                ))}
                {t.descBCP>0&&<div style={{display:"flex",justifyContent:"space-between",fontSize:12,color:D.blue,marginBottom:4,fontWeight:600}}><span>🏦 Desc. BCP</span><span style={{fontFamily:D.mono}}>-{fmt(t.descBCP)}</span></div>}
                <div style={{display:"flex",justifyContent:"space-between",color:D.gc,fontWeight:700,fontSize:19,marginTop:8,paddingTop:8,borderTop:`1px solid ${D.ln1}`,fontFamily:D.serif}}><span>TOTAL</span><span>{fmt(t.totalConDesc)}</span></div>
              </div>

              <div style={{color:D.t3,fontSize:9,letterSpacing:2,textTransform:"uppercase",marginBottom:10}}>Tipo de comprobante</div>
              <div style={{display:"flex",gap:8,marginBottom:14}}>
                {["boleta","factura"].map(tp=>(
                  <button key={tp} onClick={()=>setDocT(tp)} style={{flex:1,padding:"11px",borderRadius:11,cursor:"pointer",fontFamily:D.sans,border:`1px solid ${docT===tp?D.gb:D.ln1}`,background:docT===tp?D.gd:"#FFFFFF",color:docT===tp?D.gb:D.t2,fontWeight:600,fontSize:12,transition:"all .15s"}}>{tp==="boleta"?"🧾 Boleta":"📄 Factura"}</button>
                ))}
              </div>
              {docT==="factura"&&(
                <div style={{marginBottom:14}}>
                  <Input label="RUC" value={cRUC} onChange={e=>setCRUC(e.target.value)} placeholder="20123456789"/>
                  <Input label="Razón Social" value={cRazon} onChange={e=>setCRazon(e.target.value)} placeholder="Empresa S.A.C."/>
                  <Input label="Dirección" value={cDir} onChange={e=>setCDir(e.target.value)} placeholder="Av. Ejemplo 123"/>
                </div>
              )}
              <div style={{display:"flex",gap:8}}>
                <Btn onClick={()=>{setCobroM(null);setBcpActivo(false);}} variant="ghost" style={{flex:1}}>Cancelar</Btn>
                <Btn onClick={()=>issueDoc(p.id)} variant="gold" style={{flex:2}}>Emitir y Cerrar Mesa</Btn>
              </div>
            </div>
          </div>
        );
      })()}

      {/* ══ MODAL: ANULAR PEDIDO ══════════════════════ */}
      {voidM&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.55)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:400,padding:20}} onClick={e=>{if(e.target===e.currentTarget)setVoidM(null);}}>
          <div style={{background:"#FFFFFF",borderRadius:16,padding:"24px 20px",width:"100%",maxWidth:380,animation:"M-in .2s ease",boxShadow:"0 20px 60px rgba(0,0,0,.18)"}}>
            <div style={{textAlign:"center",marginBottom:18}}>
              <div style={{fontSize:32}}>⚠️</div>
              <div style={{fontFamily:D.serif,color:D.red,fontSize:20,fontWeight:600,marginTop:8}}>Anular pedido</div>
              <div style={{color:D.t2,fontSize:12,marginTop:4}}>El registro quedará guardado con tu nombre y motivo</div>
            </div>
            <div style={{marginBottom:16}}>
              <div style={{color:D.t2,fontSize:9,letterSpacing:1.5,textTransform:"uppercase",marginBottom:7}}>Motivo de anulación</div>
              <textarea value={voidReason} onChange={e=>setVoidReason(e.target.value)} placeholder="Describe el motivo (error en pedido, cliente cambió de opinión, etc.)"
                style={{width:"100%",padding:"10px 13px",borderRadius:9,border:`1px solid ${D.ln1}`,background:"#FFFFFF",color:D.t0,fontSize:13,outline:"none",fontFamily:D.sans,resize:"none",height:90,transition:"border-color .18s"}}
                onFocus={e=>e.target.style.borderColor=D.red} onBlur={e=>e.target.style.borderColor=D.ln1}/>
            </div>
            <div style={{display:"flex",gap:8}}>
              <Btn onClick={()=>setVoidM(null)} variant="ghost" style={{flex:1}}>Cancelar</Btn>
              <Btn onClick={desestimar} variant="red" style={{flex:2}}>Confirmar anulación</Btn>
            </div>
          </div>
        </div>
      )}

      {/* ══ MODAL: AGREGAR NOTA ═══════════════════════ */}
      {notaM&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.52)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:400,padding:20}} onClick={e=>{if(e.target===e.currentTarget)setNotaM(null);}}>
          <div style={{background:"#FFFFFF",borderRadius:16,padding:"22px 20px",width:"100%",maxWidth:380,animation:"M-in .2s ease",boxShadow:"0 20px 60px rgba(0,0,0,.18)"}}>
            <div style={{fontFamily:D.serif,color:D.t0,fontSize:20,fontWeight:600,marginBottom:4}}>Agregar anotación</div>
            <div style={{color:D.t2,fontSize:11,marginBottom:14}}>Firmado como: <b>{empleado}</b></div>
            <textarea value={notaTxt} onChange={e=>setNotaTxt(e.target.value)} placeholder="Escribe la anotación (error, modificación tardía, observación...)"
              style={{width:"100%",padding:"10px 13px",borderRadius:9,border:`1px solid ${D.ln1}`,background:"#FFFFFF",color:D.t0,fontSize:13,outline:"none",fontFamily:D.sans,resize:"none",height:100,marginBottom:14,transition:"border-color .18s"}}
              onFocus={e=>e.target.style.borderColor=D.gb} onBlur={e=>e.target.style.borderColor=D.ln1}/>
            <div style={{display:"flex",gap:8}}>
              <Btn onClick={()=>setNotaM(null)} variant="ghost" style={{flex:1}}>Cancelar</Btn>
              <Btn onClick={agregarNota} disabled={!notaTxt.trim()} variant="gold" style={{flex:2}}>Guardar nota</Btn>
            </div>
          </div>
        </div>
      )}

      {/* ══ MODAL: COMPROBANTE ════════════════════════ */}
      {compM&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.55)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:400,padding:18}} onClick={e=>{if(e.target===e.currentTarget)setCompM(null);}}>
          <div style={{background:"#FFFFFF",borderRadius:16,padding:"22px 20px",width:"100%",maxWidth:340,animation:"M-in .2s ease",maxHeight:"90vh",overflowY:"auto",fontFamily:D.sans,boxShadow:"0 20px 60px rgba(0,0,0,.18)"}}>
            <div style={{textAlign:"center",paddingBottom:14,marginBottom:14,borderBottom:"2px dashed #E0DDD6"}}>
              <div style={{fontSize:8,color:"#BDBAB2",letterSpacing:3,textTransform:"uppercase",marginBottom:2}}>Powered by Marea Systems</div>
              <div style={{fontWeight:700,fontSize:16,color:D.t0}}>{TENANT}</div>
              <div style={{display:"inline-block",background:"#F0F9FF",border:"1px solid #BAE6FD",color:"#0369A1",fontSize:8,fontWeight:700,letterSpacing:2,padding:"2px 12px",borderRadius:20,marginTop:6,textTransform:"uppercase"}}>{compM.tipo==="boleta"?"Boleta de Venta":"Factura Electrónica"}</div>
              <div style={{fontWeight:700,fontSize:13,color:D.t0,marginTop:6}}>{compM.numero}</div>
              <div style={{fontSize:10,color:"#BDBAB2",marginTop:3}}>{compM.fecha}</div>
            </div>
            {compM.ruc&&<div style={{background:D.bg4,borderRadius:8,padding:"9px 11px",marginBottom:11,fontSize:11,color:"#444",lineHeight:1.8}}><b>RUC:</b> {compM.ruc}<br/><b>Razón:</b> {compM.razon}<br/><b>Dir:</b> {compM.dir}</div>}
            <div style={{fontSize:11,color:"#999",marginBottom:9}}>{compM.mesa}{compM.mozo&&` · ${compM.mozo}`}</div>
            {compM.items.map(it=>(
              <div key={it.id} style={{display:"flex",justifyContent:"space-between",fontSize:12,color:"#222",marginBottom:7,paddingBottom:7,borderBottom:"1px solid #F0EDE6"}}>
                <div>
                  <div>{it.plato.emoji} {it.plato.nombre}</div>
                  {it.mods?.length>0&&<div style={{fontSize:9,color:"#BDBAB2",marginTop:2}}>{it.mods.map(m=>MODS.find(x=>x.id===m)?.label||m).join(" · ")}</div>}
                </div>
                <span style={{fontWeight:700,fontFamily:D.mono,minWidth:54,textAlign:"right"}}>{fmt(it.precio)}</span>
              </div>
            ))}
            {compM.descBCP>0&&(
              <div style={{background:"#EFF6FF",border:"1px solid #BFDBFE",borderRadius:8,padding:"8px 10px",marginBottom:10,fontSize:11,color:"#1D4ED8"}}>
                🏦 Descuento BCP Mastercard: <b>-{fmt(compM.descBCP)}</b><br/>
                <span style={{fontSize:9,opacity:.7}}>40% en comida · máx S/100 · no acumulable</span>
              </div>
            )}
            <div style={{borderTop:"2px dashed #E0DDD6",marginTop:8,paddingTop:12}}>
              {[{l:"Op. Gravada",v:fmt(compM.base),b:false},{l:"IGV (18%)",v:fmt(compM.igv),b:false},{l:"TOTAL",v:fmt(compM.totalConDesc),b:true}].map(r=>(
                <div key={r.l} style={{display:"flex",justifyContent:"space-between",fontSize:r.b?16:11,fontWeight:r.b?800:400,color:r.b?D.t0:"#888",marginBottom:5}}>
                  <span>{r.l}</span><span style={{color:r.b?"#7A5C10":"inherit",fontFamily:D.mono}}>{r.v}</span>
                </div>
              ))}
            </div>
            <div style={{textAlign:"center",marginTop:12,fontSize:8,color:"#D8D5CE",letterSpacing:1,lineHeight:1.8}}>REPRESENTACIÓN IMPRESA · MAREA SYSTEMS v{VER}</div>
            <div style={{display:"flex",gap:8,marginTop:16}}>
              <button onClick={()=>setCompM(null)} style={{flex:1,padding:"10px",borderRadius:9,border:`1px solid ${D.ln1}`,background:"#FFFFFF",color:D.t2,fontWeight:500,fontSize:12,cursor:"pointer"}}>Cerrar</button>
              <button onClick={()=>printDoc(compM)} style={{flex:2,padding:"10px",borderRadius:9,border:"none",background:D.nb1,color:"#E8EFFF",fontWeight:700,fontSize:12,cursor:"pointer",boxShadow:"0 4px 14px rgba(10,31,56,.25)",transition:"all .18s"}}
                onMouseEnter={e=>e.currentTarget.style.background=D.nb2} onMouseLeave={e=>e.currentTarget.style.background=D.nb1}>🖨️ Imprimir {compM.tipo}</button>
            </div>
          </div>
        </div>
      )}

      <style>{`
        @keyframes M-rise{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
        @keyframes M-up{from{transform:translateY(112%)}to{transform:translateY(0)}}
        @keyframes M-in{from{opacity:0}to{opacity:1}}
        @keyframes M-ping{0%,100%{opacity:1}50%{opacity:.35}}
        @keyframes M-bell{0%,100%{transform:rotate(0)}20%{transform:rotate(14deg)}40%{transform:rotate(-10deg)}60%{transform:rotate(6deg)}80%{transform:rotate(-3deg)}}
        @keyframes M-float{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
        input[type=date]{color-scheme:light}
        ::-webkit-scrollbar{width:3px;height:3px}
        ::-webkit-scrollbar-thumb{background:#D1C4A8;border-radius:4px}
        *{-webkit-tap-highlight-color:transparent}
      `}</style>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
